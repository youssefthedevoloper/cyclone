name: cyclone
description: Cyclone - Modern Airport Assistant Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  lottie: ^3.3.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  animations: ^2.0.11
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  local_auth: ^2.3.0
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.2.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
